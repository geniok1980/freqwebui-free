services:
  backend:
    command: >
      sh -c "uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src"
    environment:
      WATCHFILES_FORCE_POLLING: "true"
      DISABLE_FINANCE_COLLECTORS: "false"

  frontend:
    environment:
      PUBLIC_HOST: "localhost"
      VITE_API_URL: "http://localhost:8000/api/v1"
      VITE_WS_URL: "ws://localhost:8000/api/v1/ws"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"

  data-collector:
    profiles:
      - collectors
