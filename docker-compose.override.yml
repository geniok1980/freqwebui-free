services:
  backend:
    command: >
      sh -c "uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src"
    environment:
      WATCHFILES_FORCE_POLLING: "true"
      DISABLE_FINANCE_COLLECTORS: "false"

  frontend:
    environment:
      VITE_API_URL: ""
      VITE_WS_URL: ""
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"

  data-collector:
    profiles:
      - collectors
